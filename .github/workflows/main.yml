name: Mobile Automation Tests (Optimized CI)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 5
  CI: true

jobs:
  run-appium-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Enable KVM (hardware acceleration)
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Setup Java (Required for Android)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 5️⃣ Setup Node (Required for Appium)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Appium + UiAutomator2
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # 6️⃣ Download APK
      - name: Download Tasks.org APK
        run: |
          wget -q -O org.tasks.apk https://f-droid.org/repo/org.tasks_141400.apk
          ls -lh org.tasks.apk

      # 7️⃣ Run Emulator + Tests
      - name: Run Appium tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2.34.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          emulator-options: >
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -no-snapshot
          disable-animations: true
          script: |
            set -e

            echo "Waiting for emulator..."
            adb wait-for-device

            echo "Installing APK..."
            adb install -r org.tasks.apk

            echo "Starting Appium server..."
            appium --log appium.log --log-level info &
            sleep 10

            echo "Running Pytest..."
            pytest tests/ \
              -v \
              --maxfail=1 \
              --disable-warnings \
              --html=reports/report.html \
              --self-contained-html

      # 8️⃣ Always Upload Report
      - name: Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html

      # 9️⃣ Upload Appium Logs (only on failure)
      - name: Upload Appium Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log