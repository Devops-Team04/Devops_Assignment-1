name: Mobile Automation Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-appium-tests:
    name: Run Pytest + Appium on Android Emulator
    runs-on: ubuntu-latest
    env:
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Download Tasks.org APK
        run: |
          wget -q -O org.tasks.apk https://f-droid.org/repo/org.tasks_141400.apk
          ls -lh org.tasks.apk

      - name: Run Appium tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v3-beta
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          avd-name: test_avd
          disable-animations: true
          emulator-options: >-
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
          script: |
            set -e

            # Wait for emulator to boot
            adb wait-for-device

            # Install APK
            adb install -r org.tasks.apk

            # Pre-grant permissions (notifications)
            adb shell pm grant org.tasks android.permission.POST_NOTIFICATIONS || true

            # Skip first-run onboarding using SharedPreferences
            adb shell mkdir -p /data/data/org.tasks/shared_prefs
            printf '<?xml version="1.0" encoding="utf-8" standalone="yes" ?>\n<map>\n<boolean name="p_first_start" value="false" />\n</map>\n' > /tmp/org_tasks_prefs.xml
            adb push /tmp/org_tasks_prefs.xml /data/data/org.tasks/shared_prefs/org.tasks_preferences.xml
            adb shell 'chown $(stat -c "%U:%G" /data/data/org.tasks) /data/data/org.tasks/shared_prefs/org.tasks_preferences.xml'
            adb shell 'chown $(stat -c "%U:%G" /data/data/org.tasks) /data/data/org.tasks/shared_prefs'
            echo "✅ Pre-launch onboarding skipped"

            # Start Appium server
            appium --log appium.log --log-level info &
            sleep 10  # reduced from 20s

            # Pre-launch app to home screen
            adb shell am start -n org.tasks/com.todoroo.astrid.activity.MainActivity
            sleep 5  # reduced from 10s

            # Run Pytest tests
            pytest tests/ -v -s --html=reports/report.html --self-contained-html

      - name: Kill Appium process
        if: always()
        run: |
          pkill -f "appium" || true
          sleep 1

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-html-report
          path: reports/report.html

      - name: Upload Appium log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log